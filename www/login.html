{% set title = (theme_settings.title or "N45 Technologies") + " | Login" %}
{% extends "templates/web.html" %}

{% block page_content %}
<div class="page-card">
  <div class="page-card-head text-center">
    <img src="{{ theme_settings.sidebar_logo or '/assets/nxt_theme/images/shape.svg' }}" alt="N45" class="app-logo" style="height:68px;width:68px;">
    <h2>{{ theme_settings.title or "N45 Technologies" }}</h2>
    <p class="text-muted">Professional services platform</p>
  </div>
  <div class="page-card-body text-center">
    <p>Use the standard Frappe login flow for authentication.</p>
    <a class="btn btn-primary btn-login" href="/login">Continue</a>
  </div>
</div>
{% endblock %}
